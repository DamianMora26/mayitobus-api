spring.application.name=mayitobus-api

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/mayitobus_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:your_database_password}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true

app.jwt.secret=${JWT_SECRET:replace-with-a-long-random-secret}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:120}
