spring.application.name=mayitobus-api
spring.config.import=optional:classpath:application-local.properties
server.port=${PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/mayitobus_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true

app.jwt.secret=${JWT_SECRET:change-this-local-development-secret-before-production}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:120}
app.time-zone=${APP_TIME_ZONE:America/Hermosillo}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
