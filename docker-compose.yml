services:
  db:
    image: postgres:17-alpine
    container_name: mayitobus-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mayitobus_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - mayitobus-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-mayitobus_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./mayitobus-api
    container_name: mayitobus-api
    environment:
      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-mayitobus_db}
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-change-this-docker-development-secret}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-120}
      APP_TIME_ZONE: ${APP_TIME_ZONE:-America/Hermosillo}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./mayitobus-web
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: mayitobus-web
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  mayitobus-db-data:
